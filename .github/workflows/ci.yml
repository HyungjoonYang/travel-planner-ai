name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        env:
          GEMINI_API_KEY: ""
        run: pytest tests/ -v --tb=short

  auto-merge:
    needs: test
    if: contains(github.event.pull_request.labels.*.name, 'evolve')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Auto-merge evolve PR
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --repo ${{ github.repository }} \
            --squash \
            --delete-branch
