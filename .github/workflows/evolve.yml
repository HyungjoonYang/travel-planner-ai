name: Evolve (Multi-Agent)

on:
  schedule:
    # 평일+주말: KST 22:00~06:00 = UTC 13:00~21:00, 매 30분
    - cron: '0,30 13-20 * * *'
    - cron: '0 21 * * *'
    # 주말 추가: KST 12:00~20:00 = UTC 03:00~11:00, 토/일만
    - cron: '0,30 3-10 * * 0,6'
    - cron: '0 11 * * 0,6'
  workflow_dispatch: # 수동 트리거

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install -r requirements.txt 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name "travel-planner-ai[bot]"
          git config user.email "travel-planner-ai[bot]@users.noreply.github.com"

      - name: Prepare workspace
        run: mkdir -p .evolve

      # ─── Agent 1: 🧠 Coordinator ─────────────────────────────────
      - name: "🧠 Coordinator"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools "Bash,Read,Write,Glob,Grep,Edit"
          You are the 🧠 Coordinator Agent.
          Read `.claude/agents/coordinator.md` for your full instructions.
          Read `CLAUDE.md` for project context.

          IMPORTANT: GitHub Issues are the source of truth for tasks, NOT backlog.md.

          Execute your role:
          0. Generate .evolve/backlog.json cache from GitHub Issues (gh issue list).
             Also close any stale/duplicate evolve-needs-review PRs.
          1. Run pytest to health check
          2. Read status.md, error-budget.json
          3. Decide if Architect is needed (ready issues ≤ 2)
          4. Select a task from Issues with idempotency check.
             Change its label from "ready" to "in-progress" via gh issue edit.
          5. Write .evolve/handoff.json with your decision (include issue_number)
          6. Post a comment on the selected issue

          Do NOT write any source code. Do NOT modify backlog.md. Do NOT ask for confirmation.
          PROMPT

      - name: Verify Coordinator output
        run: |
          if [ ! -f .evolve/handoff.json ]; then
            echo "❌ Coordinator failed to produce handoff.json"
            exit 1
          fi
          echo "✅ Coordinator completed"
          cat .evolve/handoff.json | python3 -m json.tool

      # ─── Agent 2: 📐 Architect (conditional) ─────────────────────
      - name: "📐 Architect (check if needed)"
        id: check_architect
        run: |
          NEEDS=$(python3 -c "import json; d=json.load(open('.evolve/handoff.json')); print(d['decision']['needs_architect'])" 2>/dev/null || echo "false")
          echo "needed=$NEEDS" >> "$GITHUB_OUTPUT"
          echo "Architect needed: $NEEDS"

      - name: "📐 Architect"
        if: steps.check_architect.outputs.needed == 'True' || steps.check_architect.outputs.needed == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools "Bash,Read,Write,Glob,Grep,Edit"
          You are the 📐 Architect Agent.
          Read `.claude/agents/architect.md` for your full instructions.
          Read `CLAUDE.md` for project context.
          Read `.evolve/handoff.json` for the Coordinator's decision.

          IMPORTANT: GitHub Issues are the source of truth. Do NOT modify backlog.md.

          Execute your role:
          1. Read spec docs in markdowns/
          2. Read .evolve/backlog.json to see current tasks
          3. Analyze gaps between spec and current code in src/
          4. Check duplicate/capacity: skip if 10+ open issues exist
          5. For each new task, create a GitHub Issue with labels "ready,<tag>,phase-<N>"
             and milestone (use `gh issue create`). Include Done Criteria in the body.

          Do NOT write any source code. Do NOT modify backlog.md. Do NOT ask for confirmation.
          PROMPT

      # ─── Agent 3: 🔨 Builder ─────────────────────────────────────
      - name: "🔨 Builder"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools "Bash,Read,Write,Glob,Grep,Edit"
          You are the 🔨 Builder Agent.
          Read `.claude/agents/builder.md` for your full instructions.
          Read `CLAUDE.md` for project context.
          Read `.evolve/handoff.json` for your assigned task.

          Execute your role:
          1. Read the assigned task details from handoff.json
          2. Read the spec doc if referenced
          3. Write tests first, then implement
          4. Run pytest + ruff to verify
          5. Write .evolve/build-result.json with results

          Do NOT modify status.md or backlog.md. Do NOT ask for confirmation.
          PROMPT

      - name: Verify Builder output
        run: |
          if [ ! -f .evolve/build-result.json ]; then
            echo "⚠️ Builder did not produce build-result.json, creating failure record"
            echo '{"task_number": 0, "status": "failed", "notes": "No build-result.json produced"}' > .evolve/build-result.json
          fi
          echo "Builder result:"
          cat .evolve/build-result.json | python3 -m json.tool

      # ─── Agent 4: 🧪 QA ──────────────────────────────────────────
      - name: "🧪 QA"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools "Bash,Read,Write,Glob,Grep"
          You are the 🧪 QA Agent.
          Read `.claude/agents/qa.md` for your full instructions.
          Read `.evolve/handoff.json` for task requirements.
          Read `.evolve/build-result.json` for what the Builder did.

          Execute your role:
          1. Run all tests (pytest tests/ -v --tb=short)
          2. Check new tests exist for new features
          3. Run lint (ruff check src/ tests/)
          4. Verify done criteria from handoff.json
          5. Check for regressions and leaked secrets
          6. Write .evolve/qa-result.json with your verdict

          Do NOT modify any source code. Do NOT ask for confirmation.
          PROMPT

      - name: Verify QA output
        id: qa_check
        run: |
          if [ ! -f .evolve/qa-result.json ]; then
            echo '{"task_number": 0, "verdict": "fail", "checks": {}, "issues": ["QA agent did not produce qa-result.json"]}' > .evolve/qa-result.json
          fi
          VERDICT=$(python3 -c "import json; print(json.load(open('.evolve/qa-result.json'))['verdict'])" 2>/dev/null || echo "fail")
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"
          echo "QA verdict: $VERDICT"
          cat .evolve/qa-result.json | python3 -m json.tool

      # ─── Agent 5: 📝 Reporter ────────────────────────────────────
      - name: "📝 Reporter"
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          QA_VERDICT="${{ steps.qa_check.outputs.verdict }}"
          cat <<PROMPT | claude -p --allowedTools "Bash,Read,Write,Glob,Grep,Edit"
          You are the 📝 Reporter Agent.
          Read \`.claude/agents/reporter.md\` for your full instructions.
          Read \`CLAUDE.md\` for project context.
          Read all files in \`.evolve/\` (handoff.json, build-result.json, qa-result.json).

          The QA verdict is: $QA_VERDICT

          IMPORTANT: GitHub Issues are the source of truth for tasks, NOT backlog.md.

          Execute your role:
          1. Write LTES log to observability/logs/
          2. Update status.md with agent activity summary
          3. Update GitHub Issue status:
             - QA passed: close the issue (gh issue close), remove in-progress label
             - QA failed: add failure comment, change label back to "ready"
          4. Update error-budget.json
          5. Regenerate backlog.md as a read-only snapshot from GitHub Issues
             (gh issue list for open/closed issues, format as markdown)
          6. TWO-PHASE COMMIT:
             a. FIRST: Commit state files (backlog.md, status.md, error-budget.json,
                dashboard.json, observability/logs/) directly to main and push.
             b. THEN: Create a git branch for code changes only, commit, push, create PR.
                - QA passed: label "evolve" + "Closes #<issue_number>" in body
                - QA failed: label "evolve-needs-review"
          7. Switch back to main
          8. Remove .evolve/*.json files

          Do NOT modify source code (src/, tests/). Do NOT ask for confirmation.
          PROMPT

      # ─── Slack Notification ───────────────────────────────────────
      - name: Capture outputs
        id: results
        if: always()
        run: |
          echo "health=$(grep -oP 'Health: \K\w+' status.md 2>/dev/null || echo 'UNKNOWN')" >> "$GITHUB_OUTPUT"
          echo "task=$(grep -oP 'Current focus: \K.*' status.md 2>/dev/null || echo 'unknown')" >> "$GITHUB_OUTPUT"

          # Use qa_check step output (file may be deleted by Reporter)
          VERDICT="${{ steps.qa_check.outputs.verdict }}"
          if [ -z "$VERDICT" ]; then VERDICT="unknown"; fi
          echo "verdict=$VERDICT" >> "$GITHUB_OUTPUT"

          TESTS="?"
          if [ -f .evolve/qa-result.json ]; then
            TESTS=$(python3 -c "
          import json
          d = json.load(open('.evolve/qa-result.json'))
          c = d.get('checks', {}).get('all_tests_pass', {}).get('detail', '?')
          print(c)" 2>/dev/null || echo "?")
          fi
          echo "tests=$TESTS" >> "$GITHUB_OUTPUT"

          PR_URL=$(gh pr list --label evolve --state open --limit 1 --json url --jq '.[0].url' 2>/dev/null || echo '')
          if [ -z "$PR_URL" ]; then
            PR_URL=$(gh pr list --label evolve-needs-review --state open --limit 1 --json url --jq '.[0].url' 2>/dev/null || echo '')
          fi
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Slack Notification
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi

          HEALTH="${{ steps.results.outputs.health }}"
          TASK="${{ steps.results.outputs.task }}"
          TESTS="${{ steps.results.outputs.tests }}"
          VERDICT="${{ steps.results.outputs.verdict }}"
          PR_URL="${{ steps.results.outputs.pr_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          JOB_STATUS="${{ job.status }}"

          # Determine emoji and title
          if [ "$JOB_STATUS" != "success" ]; then
            EMOJI="🔴"; TITLE="*Evolve FAILED*"
          elif [ "$VERDICT" = "pass" ]; then
            EMOJI="🟢"; TITLE="*Evolve completed* — QA ✅"
          else
            EMOJI="🟡"; TITLE="*Evolve completed* — QA ❌ (needs review)"
          fi

          # Agent status line
          ARCHITECT="${{ steps.check_architect.outputs.needed }}"
          if [ "$ARCHITECT" = "True" ] || [ "$ARCHITECT" = "true" ]; then
            AGENT_LINE="🧠✅ → 📐✅ → 🔨✅ → 🧪${VERDICT:0:1} → 📝✅"
          else
            AGENT_LINE="🧠✅ → 📐⏭️ → 🔨✅ → 🧪${VERDICT:0:1} → 📝✅"
          fi

          # Links
          LINKS="<${RUN_URL}|Actions Log>"
          if [ -n "$PR_URL" ]; then
            LINKS="${LINKS}  ·  <${PR_URL}|Review PR>"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$(cat <<EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${EMOJI} ${TITLE}\n*Task:* ${TASK}\n*Tests:* ${TESTS}\n*Agents:* ${AGENT_LINE}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "${LINKS}"
                  }
                ]
              }
            ]
          }
          EOF
          )"
