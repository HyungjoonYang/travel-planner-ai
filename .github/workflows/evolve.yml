name: Evolve

on:
  schedule:
    # KST 22:00~06:00 = UTC 13:00~21:00, 매 30분
    - cron: '0,30 13-20 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch: # 수동 트리거

permissions:
  contents: write
  pull-requests: write

jobs:
  evolve:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code
          pip install -r requirements.txt 2>/dev/null || true

      - name: Configure git
        run: |
          git config user.name "travel-planner-ai[bot]"
          git config user.email "travel-planner-ai[bot]@users.noreply.github.com"

      - name: Run Evolve Loop
        id: evolve
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          cat <<'PROMPT' | claude -p --allowedTools "Bash,Edit,Read,Write,Glob,Grep"
          Read CLAUDE.md and .claude/commands/evolve.md carefully.
          Execute the Evolve Loop as described.

          IMPORTANT — PR workflow:
          1. Create a branch named evolve/run-<NNN>-<task-slug>
          2. Commit changes to that branch
          3. Push the branch and create a PR with `gh pr create --label evolve`
          4. Do NOT push directly to main
          5. After creating the PR, switch back to main

          Use conventional commits (feat:, fix:, test:, etc.).
          Do NOT ask for confirmation — execute autonomously.
          PROMPT

          # Capture outputs for Slack notification
          echo "health=$(grep -oP 'Health: \K\w+' status.md 2>/dev/null || echo 'UNKNOWN')" >> "$GITHUB_OUTPUT"
          echo "task=$(grep -oP 'Current focus: \K.*' status.md 2>/dev/null || echo 'unknown')" >> "$GITHUB_OUTPUT"
          echo "tests=$(grep -oP 'Tests completed: \K[\d/]+' status.md 2>/dev/null || grep -oP '\d+/\d+ pass' status.md 2>/dev/null || echo '?')" >> "$GITHUB_OUTPUT"

          # Get PR URL if one was created
          LATEST_PR=$(gh pr list --label evolve --state open --limit 1 --json url --jq '.[0].url' 2>/dev/null || echo '')
          echo "pr_url=${LATEST_PR}" >> "$GITHUB_OUTPUT"

      - name: Slack Notification (success)
        if: success()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi

          HEALTH="${{ steps.evolve.outputs.health }}"
          TASK="${{ steps.evolve.outputs.task }}"
          TESTS="${{ steps.evolve.outputs.tests }}"
          PR_URL="${{ steps.evolve.outputs.pr_url }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Health emoji
          case "$HEALTH" in
            GREEN) EMOJI="🟢" ;;
            YELLOW) EMOJI="🟡" ;;
            RED) EMOJI="🔴" ;;
            *) EMOJI="⚪" ;;
          esac

          # Build links section
          LINKS="<${RUN_URL}|Actions Log>"
          if [ -n "$PR_URL" ]; then
            LINKS="${LINKS}  ·  <${PR_URL}|Review PR>"
          fi

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$(cat <<EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "${EMOJI} *Evolve completed* — ${HEALTH}\n*Task:* ${TASK}\n*Tests:* ${TESTS}"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "${LINKS}"
                  }
                ]
              }
            ]
          }
          EOF
          )"

      - name: Slack Notification (failure)
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then exit 0; fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            -d "$(cat <<EOF
          {
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "🔴 *Evolve FAILED* — immediate attention needed"
                }
              },
              {
                "type": "context",
                "elements": [
                  {
                    "type": "mrkdwn",
                    "text": "<${RUN_URL}|View Logs>"
                  }
                ]
              }
            ]
          }
          EOF
          )"
