# Render Blueprint — auto-deploy on push to main
# https://docs.render.com/blueprint-spec

services:
  - type: web
    name: travel-planner-ai
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: cd src && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # Set manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.12"
    autoDeploy: true
    branch: main
    healthCheckPath: /health
